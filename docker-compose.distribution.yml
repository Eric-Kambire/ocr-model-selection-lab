services:
  ocr-benchmark:
    image: ${OCR_BENCHMARK_IMAGE:-ocr-benchmark-suite:1.0.0}
    container_name: ocr-benchmark-suite
    ports:
      - "${OCR_BENCHMARK_PORT:-7860}:7860"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      GRADIO_SERVER_NAME: 0.0.0.0
    volumes:
      - benchmark-runs:/app/runs
      - benchmark-dataset:/app/dataset
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  benchmark-runs:
  benchmark-dataset:
