name: Build, test and publish container

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Docker Hub credentials
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
            echo "::error::Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in repository Actions secrets."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate immutable image tags
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.image.outputs.name }}
            erickambire/ocr-model-selection-lab
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            SOURCE_URL=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull the exact published digest
        run: docker pull "${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}"

      - name: Smoke-test the published image
        shell: bash
        run: |
          docker run --detach --name ocr-benchmark-smoke \
            --publish 7860:7860 \
            "${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}"

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:7860/ > /dev/null; then
              docker inspect --format '{{.State.Health.Status}}' ocr-benchmark-smoke
              exit 0
            fi
            sleep 2
          done

          docker logs ocr-benchmark-smoke
          exit 1

      - name: Publish deployment summary
        if: always()
        run: |
          {
            echo "## Container"
            echo
            echo "- GHCR: \`${{ steps.image.outputs.name }}\`"
            echo "- Docker Hub: \`erickambire/ocr-model-selection-lab\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Tags: \`${{ steps.metadata.outputs.tags }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
