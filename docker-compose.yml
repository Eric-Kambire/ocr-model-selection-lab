services:
  init-storage:
    image: ocr-benchmark-suite:${APP_VERSION:-1.0.0}
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /app/runs /app/dataset && chown -R 10001:10001 /app/runs /app/dataset && chmod 0750 /app/runs /app/dataset"]
    volumes:
      - benchmark-runs:/app/runs
      - benchmark-dataset:/app/dataset
    restart: "no"

  ocr-benchmark:
    image: ocr-benchmark-suite:${APP_VERSION:-1.0.0}
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
    container_name: ocr-benchmark-suite
    ports:
      - "7860:7860"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      GRADIO_SERVER_NAME: 0.0.0.0
    volumes:
      - benchmark-runs:/app/runs
      - benchmark-dataset:/app/dataset
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      init-storage:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  benchmark-runs:
    driver: local
  benchmark-dataset:
    driver: local
